workflows:
  android-dev-build:
    name: Android Development Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - expo_credentials   # à créer dans Codemagic UI (voir instructions)
      node: 20.11.1
      java: 17
      vars:
        EXPO_NO_GIT_STATUS: "1"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Generate native Android project (expo prebuild)
        script: |
          npx expo prebuild --platform android --no-install

      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew app:assembleDebug -x lint -x test

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - helmihamdi977@gmail.com
        notify:
          success: true
          failure: true